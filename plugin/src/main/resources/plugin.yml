name: StackUnknown
version: 0.1.0
main: com.unknown.stack.StackPlugin
api-version: '1.20'
description: Minecraft as a 3D data viewer
authors: [SastraISM]

commands:
  ping:
    description: Phase 0 smoke test command
    usage: /ping
    permission: stackunknown.ping
  loadmock:
    description: Load a Scene Graph JSON from disk and render its points + cluster means
    usage: /loadmock <path>
    permission: stackunknown.loadmock
  upload:
    description: Ask the Python engine to ingest a dataset and stream the scene back
    usage: /upload <absolute-path> [csv|json]
    permission: stackunknown.upload
  reset:
    description: Clear all blocks within the last rendered scene bounds
    usage: /reset
    permission: stackunknown.reset
  overview:
    description: Ask Gemini for a natural-language summary of the loaded dataset
    usage: /overview
    permission: stackunknown.overview
  visualize:
    description: Ask Gemini to translate a query into visualization actions
    usage: /visualize <natural language query>
    permission: stackunknown.visualize
  center:
    description: Teleport above the global centroid for camera shots
    usage: /center
    permission: stackunknown.center
  axes:
    description: Toggle the X/Y/Z reference axes through the centroid
    usage: /axes [show|hide|toggle]
    permission: stackunknown.axes
  query:
    description: Ask Gemini a question about the loaded dataset
    usage: /query <question>
    permission: stackunknown.query
  gemini:
    description: Show which Gemini model is active plus the fallback chain
    usage: /gemini
    permission: stackunknown.gemini
permissions:
  stackunknown.ping:
    description: Allows /ping
    default: true
  stackunknown.loadmock:
    description: Allows /loadmock
    default: op
  stackunknown.upload:
    description: Allows /upload
    default: op
  stackunknown.reset:
    description: Allows /reset
    default: op
  stackunknown.overview:
    description: Allows /overview
    default: op
  stackunknown.visualize:
    description: Allows /visualize
    default: op
  stackunknown.center:
    description: Allows /center
    default: op
  stackunknown.axes:
    description: Allows /axes
    default: op
  stackunknown.query:
    description: Allows /query
    default: op
  stackunknown.gemini:
    description: Allows /gemini
    default: true
